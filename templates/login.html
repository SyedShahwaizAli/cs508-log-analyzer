<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Secure Cloud Log Analyzer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; max-width: 400px; width: 100%; }
    .card-header { background: #1f6feb; font-weight: bold; text-align: center; font-size: 1.1rem; }
    .form-control { background: #0d1117; border-color: #30363d; color: #c9d1d9; }
    .form-control:focus { background: #0d1117; color: #c9d1d9; border-color: #1f6feb; box-shadow: 0 0 0 .2rem rgba(31,111,235,.25); }
    label { color: #8b949e; }
    .btn-primary { background: #1f6feb; border-color: #1f6feb; }
  </style>
</head>
<body>
  <div class="card shadow-lg">
    <div class="card-header py-3">🔐 Admin Login</div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label for="username">Username</label>
          <input type="text" class="form-control mt-1" id="username" name="username" required autofocus>
        </div>
        <div class="mb-4">
          <label for="password">Password</label>
          <input type="password" class="form-control mt-1" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
      <p class="text-center mt-3 small" style="color:#8b949e;">Default: admin / admin123</p>
    </div>
  </div>
</body>
</html>
